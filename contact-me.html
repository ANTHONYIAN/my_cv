<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    
    <style>
        /* Shared Professional Dark Theme Variables */
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --input-bg: #0f172a;
            --input-border: #334155;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Container with room for the right navbar */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            padding-right: 220px; 
        }

        /* --- Right-Side Navbar --- */
        nav {
            position: fixed;
            top: 0;
            right: 0;
            width: 200px;
            height: 100vh;
            background-color: var(--surface-color);
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
            gap: 15px;
            z-index: 100;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--accent-color);
        }

        /* --- Professional Cards --- */
        .card {
            background-color: var(--surface-color);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-top: 3px solid transparent;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            border-top: 3px solid var(--accent-color);
        }

        h2 {
            color: var(--accent-color);
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        /* --- Contact Info Styling --- */
        .contact-info p {
            font-size: 1.1rem;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-info strong {
            color: var(--text-muted);
            min-width: 90px;
        }

        .contact-link {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-link:hover {
            color: var(--accent-color);
        }

        .email-link {
            color: var(--accent-color);
            text-decoration: none;
        }
        
        .email-link:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /* --- Form Styling --- */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: -5px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        input[type="submit"] {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            font-size: 1.1rem;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            align-self: flex-start;
        }

        input[type="submit"]:hover {
            background-color: var(--accent-hover);
            transform: scale(1.02);
        }

        /* --- Scroll Animation Classes --- */
        .slide-in {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .slide-in.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            .container {
                padding-right: 20px; 
                padding-top: 80px; 
            }

            nav {
                width: 100%;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                padding: 15px;
                border-left: none;
                border-bottom: 1px solid #334155;
            }

            input[type="submit"] {
                width: 100%; /* Full width button on mobile */
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home / CV</a>
        <a href="books-teaching.html">Books & Teaching</a>
        <a href="hobbies.html">Hobbies</a>
        <a href="contact-me.html" class="active">Contact Me</a>
    </nav>

    <div class="container">
        
        <div class="card slide-in">
            <h2>My Contact Details</h2>
            <div class="contact-info">
                <p><strong>📍 Location:</strong> Blk 3 Lot 6 Salinas st. Quezon City Fairview Dahlia Philippines.</p>
                <p><strong>📞 Phone:</strong> tel:+63 09665964825(GLOBE), +63 09937245173(DITO)</p>
                <p><strong>✉️ Email:</strong> <a href="mailto:terradoanthony000@gmail.com" class="email-link">terradoanthony000@gmail.com</a></p>
            </div>
        </div>
    </div> <script>
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.slide-in').forEach((element) => {
            observer.observe(element);
        });
    </script>

</body>
</html>
